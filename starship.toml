# Starship prompt — lean, fast, informative.
# Docs: https://starship.rs/config/

add_newline = true
command_timeout = 1000

format = """
$directory\
$git_branch$git_status\
$nodejs$python$golang$rust\
$docker_context$kubernetes\
$cmd_duration\
$line_break\
$character"""

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold cyan"
read_only = " 🔒"

[git_branch]
symbol = " "
style = "bold purple"

[git_status]
style = "bold yellow"

[cmd_duration]
min_time = 2000
format = "[ ⏱ $duration]($style) "
style = "bold yellow"

[nodejs]
symbol = " "
format = "[$symbol($version )]($style)"
style = "bold green"

[python]
symbol = " "
format = '[$symbol($version )(\($virtualenv\) )]($style)'
style = "bold yellow"

[golang]
symbol = " "
format = "[$symbol($version )]($style)"
style = "bold cyan"

[rust]
symbol = " "
format = "[$symbol($version )]($style)"
style = "bold red"

[docker_context]
symbol = " "
only_with_files = true
format = "[$symbol$context]($style) "
style = "bold blue"

[kubernetes]
disabled = false
symbol = "☸ "
format = '[$symbol$context(\($namespace\))]($style) '
style = "bold blue"
