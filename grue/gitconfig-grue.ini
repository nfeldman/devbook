# git-delta · GRUE  →  include from ~/.gitconfig:
#   [include]
#       path = ~/.config/grue/gitconfig-grue.ini
[core]
    pager = delta
[interactive]
    diffFilter = delta --color-only
[delta]
    light = true
    syntax-theme = GitHub
    navigate = true
    line-numbers = true
    hyperlinks = true
    file-style = "#3f6f86"          # slate
    hunk-header-style = "#6e7993"   # pewter-violet
    plus-style = syntax "#e2ece4"
    plus-emph-style = syntax "#cbe6d5"
    minus-style = syntax "#f0ddd9"
    minus-emph-style = syntax "#f2c9bf"
    line-numbers-plus-style = "#0f8a70"   # jade
    line-numbers-minus-style = "#bb4529"  # ember
    line-numbers-zero-style = "#7b9498"   # dim
[merge]
    conflictstyle = zdiff3
[color]
    ui = auto
# Note: font ligatures can't be disabled per-app; if diff arrows read oddly,
# choose an Iosevka build/feature set without the affected ligature.
